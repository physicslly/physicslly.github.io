name: "Claude Article Generator"

on:
  workflow_dispatch:
  schedule:
    # 00:17 UTC = 07:17 WIB
    # 12:17 UTC = 19:17 WIB
    - cron: "17 0,12 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-article:
    runs-on: ubuntu-latest

    env:
      # OpenRouter Claude Code integration
      ANTHROPIC_BASE_URL: https://openrouter.ai/api
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.OPENROUTER_API_KEY }}
      ANTHROPIC_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create working branch
        run: |
          BRANCH="claude/article-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Select OpenRouter model
        run: |
          MODELS=(
            "openrouter/owl-alpha"
          )

          RUN_NUMBER="${GITHUB_RUN_NUMBER:-1}"
          INDEX=$(( (RUN_NUMBER - 1) % ${#MODELS[@]} ))
          SELECTED_MODEL="${MODELS[$INDEX]}"

          echo "GitHub run number: $RUN_NUMBER"
          echo "Selected model index: $INDEX"
          echo "Selected model: $SELECTED_MODEL"
          echo "ANTHROPIC_MODEL=$SELECTED_MODEL" >> "$GITHUB_ENV"

      - name: Run Claude article prompt
        timeout-minutes: 60
        run: |
          claude -p "$(cat .github/prompts/create-physics-article.md)" \
            --permission-mode bypassPermissions \
            --allowedTools "Read,Edit,MultiEdit,Write,Bash" \
            --max-turns 90

      - name: Verify exactly one new post was created
        run: |
          echo "Changed files in _posts:"
          git status --short _posts

          NEW_POST_COUNT="$(git status --short _posts | awk '$1 == "??" && $2 ~ /^_posts\/.*\.md$/ {count++} END {print count+0}')"
          MODIFIED_POST_COUNT="$(git status --short _posts | awk '$1 != "??" {count++} END {print count+0}')"

          echo "New post count: $NEW_POST_COUNT"
          echo "Modified existing post count: $MODIFIED_POST_COUNT"

          if [ "$NEW_POST_COUNT" -ne 1 ]; then
            echo "::error::Expected exactly one new Markdown post in _posts/, but found $NEW_POST_COUNT."
            exit 1
          fi

          if [ "$MODIFIED_POST_COUNT" -ne 0 ]; then
            echo "::error::Existing posts were modified during article generation. Only one new post should be created."
            exit 1
          fi

      # ---- 2-Pass Math Rendering Gate ----
      # Pass 1: Non-fatal audit — if it fails, Claude gets a fix pass.
      # Pass 2: Fatal audit — blocks commit and PR if any real issue remains.

      - name: Run non-fatal strict math audit
        id: math_audit
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/strict_math_audit.py --changed-only | tee /tmp/math-audit.log

      - name: Claude fix math rendering issues
        if: steps.math_audit.outcome == 'failure'
        timeout-minutes: 25
        run: |
          cat > /tmp/claude-fix-math-prompt.md << 'PROMPT'
          Read and follow CLAUDE.md.

          Task:
          Fix only the math-rendering issues reported below.

          Important:
          - Do not create new articles.
          - Do not rewrite article substance.
          - Do not edit `_site/`.
          - Only edit Markdown files in `_posts/`.
          - Prefer editing only the files mentioned in the audit report.
          - Preserve front matter, title, references, and article structure.
          - Keep `math: true`.
          - Convert raw LaTeX symbols into `$...$`.
          - Convert long formulas into display math.
          - Use `aligned` for long equations.
          - Do not leave LaTeX commands outside math mode.
          - Do not use `\(...\)` or `\[...\]`.
          - Do not indent equations or normal paragraphs with four spaces.
          - Do not place `$$...$$` inside paragraph lines.
          - `$$` must be alone on its own line.
          - Add blank lines before and after display equations.
          - Fix `FRAGILE_STAR_SUBSCRIPT` by replacing fragile notation such as `\gamma_*` with a safer notation such as `\Gamma_{\mathrm{ch}}`.
          - Fix `FRAGILE_KET_NOTATION` by using `\lvert ... \rangle`.
          - Fix `LONG_INLINE_MATH`, `MANY_INLINE_MATH_SEGMENTS`, and `MULTI_COMMAND_INLINE_MATH` by converting inline expressions into display math.
          - Fix `DISPLAY_MATH_BLANK_LINE` by adding blank lines before and after display math.
          - If the audit reports Mermaid issues:
            - Fix `MERMAID_WITHOUT_FRONT_MATTER` by adding `mermaid: true` to front matter.
            - Fix `MERMAID_FRONT_MATTER_WITHOUT_BLOCK` by removing `mermaid: true` if no Mermaid block exists.
            - Fix `TOO_MANY_MERMAID_BLOCKS` by keeping only the most useful diagram.
            - Fix `LATEX_INSIDE_MERMAID` and `MATH_DELIMITER_INSIDE_MERMAID` by removing equations from Mermaid labels and explaining equations in prose/display math outside the diagram.
            - Fix `MERMAID_LABEL_TOO_LONG` by shortening node labels.
          - Fix all real issues from the audit report.

          Audit report:
          PROMPT
          cat /tmp/math-audit.log >> /tmp/claude-fix-math-prompt.md
          claude -p "$(cat /tmp/claude-fix-math-prompt.md)" \
            --permission-mode bypassPermissions \
            --allowedTools "Read,Edit,MultiEdit,Write,Bash" \
            --max-turns 25

      - name: Final strict math audit
        run: |
          python scripts/strict_math_audit.py --changed-only

      - name: Final build verification
        run: |
          rm -rf .jekyll-cache _site
          bundle exec jekyll build 2>&1 | tee /tmp/jekyll-build.log

          if grep -Ei "Conflict|Error|Skipping: .*future date" /tmp/jekyll-build.log; then
            echo "Build verification failed: conflict, error, or future-dated post detected."
            exit 1
          fi

          grep -Ei "Warning" /tmp/jekyll-build.log || true
          find _site -maxdepth 4 -type f -name "index.html" | grep "/posts/" | wc -l
          grep -c "<loc>" _site/sitemap.xml
          grep -RIn "math: true" _posts | wc -l

      - name: Browser-oriented rendered HTML sanity check
        run: |
          NEW_POST="$(git status --short _posts | awk '$1 == "??" && $2 ~ /^_posts\/.*\.md$/ {print $2; exit}')"

          if [ -z "$NEW_POST" ]; then
            echo "::error::Could not determine new post file."
            exit 1
          fi

          SLUG="$(basename "$NEW_POST" .md | sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}-//')"
          HTML_DIR="_site/posts/$SLUG"

          echo "New post: $NEW_POST"
          echo "Expected rendered HTML directory: $HTML_DIR"

          if [ ! -d "$HTML_DIR" ]; then
            echo "::error::Rendered HTML directory not found for new post."
            exit 1
          fi

          echo "Checking for LaTeX accidentally rendered as code blocks..."
          if grep -RInE '<pre>|<code>' "$HTML_DIR" | grep -E '\\(frac|partial|gamma|Gamma|mathcal|mathrm|begin|end|langle|rangle|psi|phi|mu|nu|Delta)|\$'; then
            echo "::error::Possible math rendered inside code/pre block."
            exit 1
          fi

          echo "Checking Mermaid/front matter consistency in source Markdown..."
          if grep -q '^```mermaid' "$NEW_POST"; then
            if ! grep -q '^mermaid: true' "$NEW_POST"; then
              echo "::error::Mermaid block found but front matter does not contain mermaid: true."
              exit 1
            fi
          fi

          # Do not grep for raw \[ or \] delimiters here.
          # A raw regex cannot distinguish banned \[...\] delimiters from valid LaTeX
          # linebreak spacing like \\[4pt] inside aligned display math.
          # Banned delimiters are handled by scripts/strict_math_audit.py.
          echo "Checking source Markdown for fragile math patterns..."
          if grep -nE '\\gamma_\*|\|0\\rangle|\$\|.*\\rangle' "$NEW_POST"; then
            echo "::error::Fragile math pattern found in source Markdown."
            exit 1
          fi

          echo "Banned raw delimiters are enforced by scripts/strict_math_audit.py."
          echo "Do not grep source Markdown for '\\[' or '\\]' here because valid LaTeX linebreak spacing such as '\\\\[4pt]' may appear inside aligned display math."

          echo "Checking generated HTML for fragile source patterns only..."
          if grep -RInE '\\gamma_\*|\|0\\rangle|\$\|.*\\rangle' "$HTML_DIR"; then
            echo "::error::Fragile math pattern found in generated HTML source."
            exit 1
          fi

          echo "Rendered HTML sanity check passed."

      - name: Show changed files
        run: |
          git status --short

      - name: Collect generated files on failure
        if: failure()
        run: |
          mkdir -p /tmp/generated-on-failure

          git status --short > /tmp/generated-on-failure/git-status.txt

          if [ -f /tmp/math-audit.log ]; then
            cp /tmp/math-audit.log /tmp/generated-on-failure/math-audit.log
          fi

          if [ -f /tmp/jekyll-build.log ]; then
            cp /tmp/jekyll-build.log /tmp/generated-on-failure/jekyll-build.log
          fi

          git status --short _posts | awk '{print $2}' | while read -r file; do
            if [ -f "$file" ]; then
              mkdir -p "/tmp/generated-on-failure/$(dirname "$file")"
              cp "$file" "/tmp/generated-on-failure/$file"
            fi
          done

      - name: Upload generated files on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generated-files-on-failure
          path: /tmp/generated-on-failure
          if-no-files-found: ignore

      - name: Commit changes
        id: commit
        run: |
          if [ -z "$(git status --porcelain _posts)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add _posts
          git commit -m "Add AI-generated physics article"
          git push origin "$BRANCH"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Add AI-generated physics article" \
            --body "This PR was generated by Claude Code via GitHub Actions.

          Schedule:
          - Runs every 12 hours
          - Creates 1 article per run
          - Expected output: 2 articles per 24 hours

          Checklist:
          - CLAUDE.md followed
          - Existing posts reviewed
          - Topic gap selected
          - Article created in _posts/
          - 2-pass math audit passed (non-fatal first pass, fatal final pass)
          - Jekyll build executed
          - Manual browser review still recommended before merge"
