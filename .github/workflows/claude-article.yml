name: "Claude Article Generator"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-article:
    runs-on: ubuntu-latest

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      # Free OpenRouter model router
      OPENROUTER_MODEL: qwen/qwen3-coder:free

      # OpenRouter Claude Code integration
      ANTHROPIC_BASE_URL: https://openrouter.ai/api
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.OPENROUTER_API_KEY }}
      ANTHROPIC_API_KEY: ""

      # Force Claude Code roles to use OpenRouter free router
      ANTHROPIC_DEFAULT_OPUS_MODEL: qwen/qwen3-coder:free
      ANTHROPIC_DEFAULT_SONNET_MODEL: qwen/qwen3-coder:free
      ANTHROPIC_DEFAULT_HAIKU_MODEL: qwen/qwen3-coder:free
      CLAUDE_CODE_SUBAGENT_MODEL: qwen/qwen3-coder:free

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create working branch
        run: |
          BRANCH="claude/article-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Run Claude article prompt
        run: |
          claude -p "$(cat .github/prompts/create-physics-article.md)" \
            --model "$OPENROUTER_MODEL" \
            --permission-mode bypassPermissions \
            --allowedTools "Read,Edit,MultiEdit,Write,Bash" \
            --max-turns 25

      - name: Final build verification
        run: |
          rm -rf .jekyll-cache _site
          bundle exec jekyll build 2>&1 | tee /tmp/jekyll-build.log
          grep -Ei "Conflict|Skipping|Error|Warning" /tmp/jekyll-build.log || true
          find _site -maxdepth 4 -type f -name "index.html" | grep "/posts/" | wc -l
          grep -c "<loc>" _site/sitemap.xml
          grep -RIn "math: true" _posts | wc -l

      - name: Show changed files
        run: |
          git status --short

      - name: Commit changes
        id: commit
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add _posts
          git commit -m "Add AI-generated physics article"
          git push origin "$BRANCH"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Add AI-generated physics article" \
            --body "This PR was generated by Claude Code via GitHub Actions.

          Schedule:
          - Runs every 12 hours
          - Creates 1 article per run
          - Expected output: 2 articles per 24 hours

          Checklist:
          - CLAUDE.md followed
          - Existing posts reviewed
          - Topic gap selected
          - Article created in _posts/
          - Jekyll build executed
          - Math-rendering audit requested from CLAUDE.md
          - Manual browser review still recommended before merge"
