name: "Claude Article Generator"

on:
  workflow_dispatch:
  schedule:
    # 00:17 UTC = 07:17 WIB
    # 12:17 UTC = 19:17 WIB
    - cron: "17 0,12 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-article:
    runs-on: ubuntu-latest

    env:
      # OpenRouter Claude Code integration
      ANTHROPIC_BASE_URL: https://openrouter.ai/api
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.OPENROUTER_API_KEY }}
      ANTHROPIC_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create working branch
        run: |
          BRANCH="claude/article-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Select OpenRouter model
        run: |
          MODELS=(
            "openrouter/owl-alpha"
            "nvidia/nemotron-3-ultra-550b-a55b:free"
          )

          RUN_NUMBER="${GITHUB_RUN_NUMBER:-1}"
          INDEX=$(( (RUN_NUMBER - 1) % ${#MODELS[@]} ))
          SELECTED_MODEL="${MODELS[$INDEX]}"

          echo "GitHub run number: $RUN_NUMBER"
          echo "Selected model index: $INDEX"
          echo "Selected model: $SELECTED_MODEL"
          echo "ANTHROPIC_MODEL=$SELECTED_MODEL" >> "$GITHUB_ENV"

      - name: Run Claude article prompt
        run: |
          claude -p "$(cat .github/prompts/create-physics-article.md)" \
            --permission-mode bypassPermissions \
            --allowedTools "Read,Edit,MultiEdit,Write,Bash" \
            --max-turns 45

      # ---- 2-Pass Math Rendering Gate ----
      # Pass 1: Non-fatal audit — if it fails, Claude gets a fix pass.
      # Pass 2: Fatal audit — blocks commit and PR if any real issue remains.

      - name: Run non-fatal strict math audit
        id: math_audit
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/strict_math_audit.py --changed-only | tee /tmp/math-audit.log

      - name: Claude fix math rendering issues
        if: steps.math_audit.outcome == 'failure'
        run: |
          cat > /tmp/claude-fix-math-prompt.md << 'PROMPT'
          Read and follow CLAUDE.md.

          Task:
          Fix only the math-rendering issues reported below.

          Important:
          - Do not create new articles.
          - Do not rewrite article substance.
          - Do not edit `_site/`.
          - Only edit Markdown files in `_posts/`.
          - Prefer editing only the files mentioned in the audit report.
          - Preserve front matter, title, references, and article structure.
          - Keep `math: true`.
          - Convert raw LaTeX symbols into `$...$`.
          - Convert long formulas into display math.
          - Use `aligned` for long equations.
          - Do not leave LaTeX commands outside math mode.
          - Do not use `\(...\)` or `\[...\]`.
          - Do not indent equations or normal paragraphs with four spaces.
          - Do not place `$$...$$` inside paragraph lines.
          - `$$` must be alone on its own line.
          - Add blank lines before and after display equations.
          - Fix all real issues from the audit report.

          Audit report:
          PROMPT
          cat /tmp/math-audit.log >> /tmp/claude-fix-math-prompt.md
          claude -p "$(cat /tmp/claude-fix-math-prompt.md)" \
            --permission-mode bypassPermissions \
            --allowedTools "Read,Edit,MultiEdit,Write,Bash" \
            --max-turns 25

      - name: Final strict math audit
        run: |
          python scripts/strict_math_audit.py --changed-only

      - name: Final build verification
        run: |
          rm -rf .jekyll-cache _site
          bundle exec jekyll build 2>&1 | tee /tmp/jekyll-build.log

          if grep -Ei "Conflict|Error|Skipping: .*future date" /tmp/jekyll-build.log; then
            echo "Build verification failed: conflict, error, or future-dated post detected."
            exit 1
          fi

          grep -Ei "Warning" /tmp/jekyll-build.log || true
          find _site -maxdepth 4 -type f -name "index.html" | grep "/posts/" | wc -l
          grep -c "<loc>" _site/sitemap.xml
          grep -RIn "math: true" _posts | wc -l

      - name: Show changed files
        run: |
          git status --short

      - name: Commit changes
        id: commit
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add _posts
          git commit -m "Add AI-generated physics article"
          git push origin "$BRANCH"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Add AI-generated physics article" \
            --body "This PR was generated by Claude Code via GitHub Actions.

          Schedule:
          - Runs every 12 hours
          - Creates 1 article per run
          - Expected output: 2 articles per 24 hours

          Checklist:
          - CLAUDE.md followed
          - Existing posts reviewed
          - Topic gap selected
          - Article created in _posts/
          - 2-pass math audit passed (non-fatal first pass, fatal final pass)
          - Jekyll build executed
          - Manual browser review still recommended before merge"
